<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <main class="auth-container">

        <section class="auth-image">

            <h1>WELCOME</h1>

        </section>

        <section class="auth-form">

            <div class="form-wrapper">

                <h2>Cadastrar</h2>

                <form>

                    <div class="input-group">

                        <label for="name">
                            Nome
                        </label>

                        <input
                            type="text"
                            id="name"
                            required
                        >

                    </div>

                    <div class="input-group">

                        <label for="email">
                            E-mail
                        </label>

                        <input
                            type="email"
                            id="email"
                            required
                        >

                    </div>

                    <div class="input-group">

                        <label for="password">
                            Senha
                        </label>

                        <input
                            type="password"
                            id="password"
                            required
                        >

                    </div>

                    <div class="input-group">

                        <label for="confirm-password">
                            Confirmar Senha
                        </label>

                        <input
                            type="password"
                            id="confirm-password"
                            required
                        >

                    </div>

                    <button type="submit">
                        Criar Conta
                    </button>

                </form>

                <p class="register-link">

                    Já possui uma conta?

                    <a href="login.html">
                        Entrar
                    </a>

                </p>

            </div>

        </section>

    </main>
</body>
</html>
